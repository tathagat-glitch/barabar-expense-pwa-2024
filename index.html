<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no"
    />
    <title>Barabar - Split Expenses</title>
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />
    
    <!-- Theme Color -->
    <meta name="theme-color" content="#2563eb" />
    <meta name="msapplication-TileColor" content="#2563eb" />
    
    <!-- Apple Touch Icon -->
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.svg" />
    <link rel="apple-touch-icon" sizes="152x152" href="/icons/icon-152x152.svg" />
    <link rel="apple-touch-icon" sizes="180x180" href="/icons/apple-touch-icon.svg" />
    <link rel="apple-touch-icon" sizes="167x167" href="/icons/icon-192x192.svg" />
    
    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="/icons/favicon.ico" />
    <link rel="icon" type="image/svg+xml" sizes="32x32" href="/icons/favicon-32x32.svg" />
    <link rel="icon" type="image/svg+xml" sizes="16x16" href="/icons/favicon-16x16.svg" />
    <link rel="shortcut icon" href="/icons/favicon.svg" />
    
    <!-- Apple PWA Settings -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Barabar" />
    
    <!-- Microsoft PWA Settings -->
    <meta name="msapplication-TileImage" content="/icons/icon-144x144.svg" />
    <meta name="msapplication-config" content="/browserconfig.xml" />
    
    <!-- SEO and Social -->
    <meta name="description" content="Split expenses with friends and family, Splitwise-style." />
    <meta name="author" content="Barabar" />
    <meta name="keywords" content="expense splitter, split expenses, shared costs, group expenses" />
    
    <!-- Prevent FOUC -->
    <style>
      body {
        margin: 0;
        padding: 0;
        background-color: #ffffff;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen',
          'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue',
          sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      
      #root {
        min-height: 100vh;
      }
      
      /* Loading screen */
      .loading {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        background-color: #ffffff;
        color: #000000;
        font-size: 18px;
      }
    </style>
    
    <!-- Preload critical resources -->
    <link rel="modulepreload" href="/src/main.jsx" crossorigin="anonymous" />
  </head>
  <body>
    <div id="root">
      <div class="loading">Loading Barabar...</div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
